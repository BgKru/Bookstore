version: '3.8'

services:
  backend:
    build: ./backend
    container_name: bookstore-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:bookstore
      - SPRING_H2_CONSOLE_ENABLED=true
    networks:
      - bookstore-network

  frontend:
    build: ./frontend
    container_name: bookstore-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - bookstore-network

networks:
  bookstore-network:
    driver: bridge